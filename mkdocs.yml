site_name: SUCC - SurfsUp Character Controller
site_description: Multiplayer-focused, inheritable, state-based character controller for Godot 4.
site_url: https://markarneman.github.io/SUCC/
repo_url: https://github.com/markarneman/SUCC
edit_uri: edit/main/docs/

theme:
  name: material
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  palette:
    - scheme: gruvbox-dark
      toggle:
        icon: material/weather-sunny
        name: Light mode
    - scheme: gruvbox-light
      toggle:
        icon: material/weather-night
        name: Dark mode
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/gruvbox.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Extending SUCC: extending.md
  - Networking: networking.md
  - API Reference:
    - SUCC: api/succ.md
    - SUCCPawn: api/succ_pawn.md
    - SUCCConfig: api/succ_config.md
    - SUCCCamera: api/succ_camera.md
  - Games Built with SUCC: games.md
  - Acknowledgements: acknowledgements.md
